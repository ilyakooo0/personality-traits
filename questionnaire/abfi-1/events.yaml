messages:
- id: start
  text: |
    Дорогой участник, добро пожаловать на практикум LESSSTRESS! 
    Этот практикум предлагает 8 техник, направленных на преодоление негативных психологических состояний. Эти техники не занимают много времени, поэтому их удобно практиковать в течение дня. При этом предложенные практики доказали свою эффективность: участники прошлых запусков отметили снижение общего уровня стресса и тревоги.  
    Практикум рассчитан на месяц – именно столько нужно, чтобы закрепить новые паттерны поведения. Пожалуйста, выполните предложенные вам задания – они точно покажут свой эффект! 
    По всем вопросам вы можете обращаться к @vv_penner. Приятного вам путешествия в мир осознанности!
  file:
  - 1.webp
  - foo.mp4
  buttons:
  - id: 1
    text: Начать курс
    action: start_course
    event: day_1
  delay_minutes: 0
- id: day_1
  text: |
    Тревога, стресс, выгорание и прочие неприятные состояния крадут яркость жизни, заставляя существовать на автопилоте. Мы не замечаем, как в таком режиме наш разум сам по себе запускает бесконечные циклы тревожных мыслей, планирования и самокопания. Этот "режим" работает в фоне, затягивая нас в спирали тревоги. Мы теряем контакт с настоящим — с его красотой, радостью, глубиной. 
    Но что можно с этим сделать? 
    Внедрить в свою жизнь осознанность. Осознанность помогает выйти из режима автопилота, вернуть контроль и снова почувствовать жизнь во всех её красках. Начать — уже значит сделать шаг к себе! 
    Сегодня мы предлагаем вам практику, которая может помочь наладить навык осознанности. 
  file:
  - 2.webp
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: message_1
  delay_minutes: 0
- id: practice_1 
  text: |
    Техника “Ешьте изюм осознанно”
    Вам понадобится несколько изюминок (или чего угодно!) для этой техники. Сядьте удобно там, где есть хорошее освещение и вас не будут беспокоить. Затем медленно настройте себя на прохождение практики
  file:
  - Ешьте изюм осознанно.pdf
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_1_end
  delay_minutes: 0
- id: day_1_end
  text: |
    Поздравляем вас с прохождением первой практики! Как вы оцениваете этот опыт? Что вы ощущали? Чем этот опыт отличается от обычного опыта еды? 
    Для закрепления навыка предлагаем вам проделывать это в течение нескольких ближайших дней. До встречи завтра!
  delay_minutes: 10
- id: day_2
  text: |
    Осознанность – ключ к более гармоничной жизни. Участники, прошедшие практикум, отмечают видимые улучшения! 
    
    Для закрепления навыка осознанности предлагаем вам повторить практику “Ешьте изюм осознанно”, применив её к вашим повседневным делам. 
  file:
  - 4.png
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_2
  delay_minutes: 1140
- id: practice_2
  text: |
    Выберите одно повседневное действие, которое выполняете каждый день, и решите, что на этой неделе, насколько сможете, привнесете в каждый его элемент свежее качество намеренной и мягкой осознанности, как вы это делали с изюмом. Лучше это делать с одним и тем же действием каждый день в течение всей недели.
  file:
  - 5.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_2_end
  delay_minutes: 0
- id: day_2_end
  text: |
    Как вы себя чувствуете после практики? Осознайте свои ощущения, проанализируйте их, закрепите этот опыт повторением практики. До встречи послезавтра!
  delay_minutes: 10
- id: day_3 
  text: |
    Как вы себя чувствуете после наших первых практик? Предлагаем вам сегодня повторить любую из пройденных практик. 
    Продолжаем практиковать осознанность. У вас обязательно получится! 
  file:
  - 3.png
  delay_minutes: 1140
- id: day 4
  text: |
     Привет, дорогой друг! На автопилоте мы как будто улетаем куда-то далеко. Но куда мы летим? Чаще всего мы теряемся в мыслях того или иного рода - планах, воспоминаниях или мечтах. Мышление — друг, но когда оно захватывает разум, то становится врагом. Порой оно приводит к хроническому стрессу, отрывая нас от реальности. Мы не живём — мы теряемся в своих же мыслях. Силой воли мысли порой не остановить. Но есть другой путь — выйти из потока мыслей и почувствовать момент. Осознанность учит нас видеть, слышать, ощущать, просто быть. Это способ вернуться в жизнь и по-настоящему её почувствовать.
     Сегодня мы предлагаем практику “Другой способ познания”
  file:
  - 4.png
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: message_4
  delay_minutes: 1140
- id: practice_3
  text: |
   Сядьте в удобное положение на стуле с прямой спинкой. Закройте глаза. Приготовьтесь к практике. 
  file:
  - Другой способ познания.pdf
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_4_end
  delay_minutes: 0
- id: day_4_end
  text: |
    Поздравляем с прохождением третьей практики! Что вы заметили, когда подключались  к ощущениям в своем теле? Что больше всего поразило вас в различии между двумя способами познания – думать о своем теле или поместить свое внимание внутрь телесных ощущений? 
    Проанализируйте свой опыт и постарайтесь повторить практику. До встречи завтра!
  delay_minutes: 10
- id: day_5 
  text: |
    Как вы себя чувствуете после наших первых практик? 
    Посредством осознанности мы открываем другой способ познания - более тихий и мудрый голос, который обычно заглушается громкими выкриками думающего разума. Для закрепления навыка осознанности предлагаем вам упражнение “Встреча на улице”. 
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_4
  delay_minutes: 1140
- id: practice_4
  text: |
   Сядьте в удобное положение. Когда будете готовы, прочитайте описанную на карточке ситуацию.Сосредоточьтесь на минуту или две, чтобы представить себе ситуацию как можно ярче. Возможно, для этого вам потребуется закрыть глаза. Не торопитесь. Попытайтесь полностью перенестись в воображаемую сцену.
  file:
  - 6.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_5_end
- id: day_5_end
  text: |
    Как вы себя чувствуете? 
    Мысли - это не факты, а ментальные события. Наши эмоциональные реакции отражают интерпретации, которыми мы наделяем ситуации, а не сами ситуации. Наше настроение влияет на нашу интерпретацию событий, а наша интерпретация поддерживает наше настроение. 
    Мы можем выйти из паттернов мышления, которые держат нас в болезненных эмоциях, с помощью переключения способа познания - от потерянности в собственной голове к познанию и ощущению своего тела непосредственно, осознанно. Постарайтесь практиковать предложенные техники в течение некоторого времени: ловите себя на мыслях, отделяйте от них факты, следите за чувствами, направляйте их в более приятное русло. До встречи завтра!
  delay_minutes: 10





  



  