messages:
- id: start
  text: |
    Дорогой участник, добро пожаловать на практикум LESSSTRESS! 
    Этот практикум предлагает 8 техник, направленных на преодоление негативных психологических состояний. Эти техники не занимают много времени, поэтому их удобно практиковать в течение дня. При этом предложенные практики доказали свою эффективность: участники прошлых запусков отметили снижение общего уровня стресса и тревоги.  
    Практикум рассчитан на месяц – именно столько нужно, чтобы закрепить новые паттерны поведения. Пожалуйста, выполните предложенные вам задания – они точно покажут свой эффект! 
    По всем вопросам вы можете обращаться к @vv_penner. Приятного вам путешествия в мир осознанности!
  file:
  - 1.webp
  - foo.mp4
  buttons:
  - id: 1
    text: Начать курс
    action: start_course
    event: day_1
  delay_minutes: 0
- id: day_1
  text: |
    Тревога, стресс, выгорание и прочие неприятные состояния крадут яркость жизни, заставляя существовать на автопилоте. Мы не замечаем, как в таком режиме наш разум сам по себе запускает бесконечные циклы тревожных мыслей, планирования и самокопания. Этот "режим" работает в фоне, затягивая нас в спирали тревоги. Мы теряем контакт с настоящим — с его красотой, радостью, глубиной. 
    Но что можно с этим сделать? 
    Внедрить в свою жизнь осознанность. Осознанность помогает выйти из режима автопилота, вернуть контроль и снова почувствовать жизнь во всех её красках. Начать — уже значит сделать шаг к себе! 
    Сегодня мы предлагаем вам практику, которая может помочь наладить навык осознанности. 
  file:
  - 2.webp
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: message_1
  delay_minutes: 0
- id: practice_1 
  text: |
    Техника “Ешьте изюм осознанно”
    Вам понадобится несколько изюминок (или чего угодно!) для этой техники. Сядьте удобно там, где есть хорошее освещение и вас не будут беспокоить. Затем медленно настройте себя на прохождение практики
  file:
  - Ешьте изюм осознанно.pdf
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_1_end
  delay_minutes: 0
- id: day_1_end
  text: |
    Поздравляем вас с прохождением первой практики! Как вы оцениваете этот опыт? Что вы ощущали? Чем этот опыт отличается от обычного опыта еды? 
    Для закрепления навыка предлагаем вам проделывать это в течение нескольких ближайших дней. До встречи завтра!
  delay_minutes: 10
- id: day_2
  text: |
    Осознанность – ключ к более гармоничной жизни. Участники, прошедшие практикум, отмечают видимые улучшения! 
    
    Для закрепления навыка осознанности предлагаем вам повторить практику “Ешьте изюм осознанно”, применив её к вашим повседневным делам. 
  file:
  - 4.png
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_2
  delay_minutes: 1140
- id: practice_2
  text: |
    Выберите одно повседневное действие, которое выполняете каждый день, и решите, что на этой неделе, насколько сможете, привнесете в каждый его элемент свежее качество намеренной и мягкой осознанности, как вы это делали с изюмом. Лучше это делать с одним и тем же действием каждый день в течение всей недели.
  file:
  - 5.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_2_end
  delay_minutes: 0
- id: day_2_end
  text: |
    Как вы себя чувствуете после практики? Осознайте свои ощущения, проанализируйте их, закрепите этот опыт повторением практики. До встречи послезавтра!
  delay_minutes: 10
- id: day_3 
  text: |
    Как вы себя чувствуете после наших первых практик? Предлагаем вам сегодня повторить любую из пройденных практик. 
    Продолжаем практиковать осознанность. У вас обязательно получится! 
  file:
  - 3.png
  delay_minutes: 1140
- id: day 4
  text: |
     Привет, дорогой друг! На автопилоте мы как будто улетаем куда-то далеко. Но куда мы летим? Чаще всего мы теряемся в мыслях того или иного рода - планах, воспоминаниях или мечтах. Мышление — друг, но когда оно захватывает разум, то становится врагом. Порой оно приводит к хроническому стрессу, отрывая нас от реальности. Мы не живём — мы теряемся в своих же мыслях. Силой воли мысли порой не остановить. Но есть другой путь — выйти из потока мыслей и почувствовать момент. Осознанность учит нас видеть, слышать, ощущать, просто быть. Это способ вернуться в жизнь и по-настоящему её почувствовать.
     Сегодня мы предлагаем практику “Другой способ познания”
  file:
  - 4.png
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: message_4
  delay_minutes: 1140
- id: practice_3
  text: |
   Сядьте в удобное положение на стуле с прямой спинкой. Закройте глаза. Приготовьтесь к практике. 
  file:
  - Другой способ познания.pdf
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_4_end
  delay_minutes: 0
- id: day_4_end
  text: |
    Поздравляем с прохождением третьей практики! Что вы заметили, когда подключались  к ощущениям в своем теле? Что больше всего поразило вас в различии между двумя способами познания – думать о своем теле или поместить свое внимание внутрь телесных ощущений? 
    Проанализируйте свой опыт и постарайтесь повторить практику. До встречи завтра!
  delay_minutes: 10
- id: day_5 
  text: |
    Как вы себя чувствуете после наших первых практик? 
    Посредством осознанности мы открываем другой способ познания - более тихий и мудрый голос, который обычно заглушается громкими выкриками думающего разума. Для закрепления навыка осознанности предлагаем вам упражнение “Встреча на улице”. 
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_4
  delay_minutes: 1140
- id: practice_4
  text: |
   Сядьте в удобное положение. Когда будете готовы, прочитайте описанную на карточке ситуацию.Сосредоточьтесь на минуту или две, чтобы представить себе ситуацию как можно ярче. Возможно, для этого вам потребуется закрыть глаза. Не торопитесь. Попытайтесь полностью перенестись в воображаемую сцену.
  file:
  - 6.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_5_end
- id: day_5_end
  text: |
    Как вы себя чувствуете? 
    Мысли - это не факты, а ментальные события. Наши эмоциональные реакции отражают интерпретации, которыми мы наделяем ситуации, а не сами ситуации. Наше настроение влияет на нашу интерпретацию событий, а наша интерпретация поддерживает наше настроение. 
    Мы можем выйти из паттернов мышления, которые держат нас в болезненных эмоциях, с помощью переключения способа познания - от потерянности в собственной голове к познанию и ощущению своего тела непосредственно, осознанно. Постарайтесь практиковать предложенные техники в течение некоторого времени: ловите себя на мыслях, отделяйте от них факты, следите за чувствами, направляйте их в более приятное русло. До встречи завтра!
  delay_minutes: 10
- id: day_6 
  text: |
    Как вы себя чувствуете сейчас? Сегодня мы предлагаем вам вернуться к одной из прошедших практик — выберите ту, что откликается больше всего. Каждое возвращение к осознанности укрепляет ваш внутренний ресурс. Вы уже на правильном пути — продолжаем идти спокойно и уверенно.
  file:
  - 7.png
  delay_minutes: 1140
- id: day_7 
  text: |
    Где сейчас ваш разум — здесь и сейчас или в прошлом и будущем? Часто мы не замечаем, как он уносит нас: в сожаления о вчерашнем или тревоги о завтрашнем. А настоящее — живое, полное, яркое — проходит мимо. Осознанность помогает вернуться в этот момент. Потому что именно здесь — жизнь. Вы часто ловите себя на том, что мысленно далеко отсюда и сейчас? Это — ментальное путешествие во времени.Когда мы не замечаем этого, наш ум сам ведёт нас в прошлые сожаления или в будущие страхи. Мы теряемся в бесконечном прокручивании "что было" и "что будет", чувствуя себя опустошёнными. Это не жизнь, а побег от неё. Выход — в осознанности: научиться замечать, когда ум уносит вас, и мягко возвращать внимание в настоящее. Только здесь вы можете по-настоящему жить.
    Сегодня мы предлагаем вам трехминутную медитативную передышку.
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_5
  delay_minutes: 1140
- id: practice_5
  text: |
    Настройтесь на медитацию: сядьте прямо, закройте глаза, если такая возможность есть. Приятной практики!
  file:
  - Трехминутная медитативная передышка.pdf
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_7_end 
- id: day_7_end
  text: |
   Что вы сделали после того, как заметили, что ваши мысли блуждают? Не ругайте себя за это. Просто плавно возвращайтесь к медитации. 
   Рекомендуем повторять данную практику в моменты, когда напряжение возрастает: просто дайте себе возможность немного замедлиться.
  delay_minutes: 10
- id: day_8 
  text: |
    Как ваше самочувствие сегодня? У нас для вас есть практика – Календарь неприятных переживаний. 
    Хотите по-новому взглянуть на неприятные переживания? Попробуйте разложить их на части: заметьте чувство, мысли, телесные ощущения — и отдельно от всего этого — свою реакцию на них. Осознанность учит видеть дискомфорт без оценки, как наблюдатель. Это даёт пространство: вы перестаете сливаться с эмоцией и учитесь встречать трудное — не борясь, а присутствуя.
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_6
  delay_minutes: 1140
- id: practice_6
  text: |
    Используйте следующие вопросы, чтобы сосредоточить свое осознание на деталях негативного переживания, когда оно происходит: 
    - Что вы переживали? 
    - Что вы ощущали в своем теле?
    - Какие чувства и настроения возникали? 
    - Какие мысли появлялись? 
    - Какие мысли об этом сейчас?
    Запишите свои мысли слово в слово, если они отражают то, что вы переживаете, или опишите любые образы, возникающие перед вашими глазами; обратите внимание, где именно в теле вы испытывали какие-то ощущения, и какими они были. Используйте сам процесс записи как возможность осознавать мысли, возникающие в голове, когда вы это пишете.
  file:
  - 8.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_8_end 
- id: day_8_end
  text: |
   Попробуйте заметить способы, которыми ваше мышление питает порочный круг, усиливая несчастные настроения. Часто истории, которые мы рассказываем себе о своих неприятных переживаниях, - мысли, которые вызваны ими, - оживляют и поддерживают наши страдания. 
   Например, мы можем говорить себе: "Я не должен так себя чувствовать. Почему я так глуп и слаб?" Или мы можем задаваться вопросом: "Что, если это будет продолжаться?" И тогда мы почувствуем себя еще хуже. У нас есть автоматическая тенденция реагировать на неприятные ощущения желанием избавиться от них или избежать их. Это "нежелание'; или аверсия, сама по себе чувствуется как нечто неприятное. 
   Дальше поговорим о том, как можно реагировать иначе. До встречи!
  delay_minutes: 10
- id: day_9
  text: |
   Доброго дня! 
   Прежде, чем перейти к изучению новых способов реагирования на негативные переживания, предлагаем вам закрепить один из освоенных нами навыков. Повторите любое задание сегодня. 
   До встречи!
  delay_minutes: 1140 
- id: day_10
  text: |
    Доброго дня! 
    Как ваше самочувствие сегодня? 
    Мы можем реагировать на неприятные чувства и неудобные состояния разными способами. Зачастую же мы просто стремимся избежать этого опыта. 
    Аверсия - это стремление скрыться, избавиться,отключиться или уничтожить то, что мы воспринимаем как неприятное. Это та сила, которая стоит за управляемым действием, удерживает нас в таких негативных состояниях, как депрессия, тревога, гнев и стресс. На карточке представлен механизм аверсии. 
    Главная цель практики на этой неделе – начать избавляться от привычки избегать и отключаться от неприятных переживаний. Способ сделать это - стать экспертом в том, как аверсия влияет на вас. Предлагаем вам упражнение “Контрольный список негативных мыслей”
  file:
  - 9.png
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_7
  delay_minutes: 1140
- id: practice_7
  text: |
    Вспомните тот период, когда вы переживали тяжелые состояния. В этой таблице собраны мысли, которые могли возникать тогда. 
    Отметьте (✓) в столбце А те, что возникали у вас. 
    Далее оцените, насколько вы верили в каждую из них в пик тяжелого состояния — от 0 («не верил(а) вообще») до 10 («верил(а) полностью») в столбце Б.
    Теперь вспомните время, когда вам было хорошо. Пересмотрите те же мысли и поставьте оценки от 0 до 10 в столбце В — насколько вы в них верили, будучи в здравом состоянии.
    Это упражнение помогает увидеть: негатив искажает реальность. То, что в тяжёлый период кажется истиной, на самом деле — лишь её тень
  file:
  - Контрольный список негативных мыслей.pdf
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_10_end 




  



  