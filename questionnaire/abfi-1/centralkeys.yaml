messages:
- id: start
  text: |
    Добро пожаловать на практикум по снижению тревожности! Практикум основан на доказательных техниках, проверенных большим количеством исследований и показавший свою эффективность в прошлых запусках. В этом практикуме вам будет предложено: 
   - две лекции 
   - 8 заданий с подробным описанием их научной эффективности 
   - текстовые и аудиоматериалы для выполнения заданий 
   - напоминания для закрепления освоенных навыков 
   
   Просьба, пожалуйста, авторизоваться по почте и указывать эту же почту при прохождении анкет — так мы сможем идентифицировать вас. Обещаем строгую конфиденциальность!
   
   По всем вопросам вы можете обращаться к @vv_penner. Приятного вам путешествия в мир осознанности! 
  file:
  - 1.2.png 
  buttons:
  - id: 1
    text: Начать курс
    action: start_course
    event: day_1
  delay_minutes: 0
- id: day_1
  text: |
    Состояния тревоги, хронического стресса и эмоционального выгорания оказывают значительное негативное воздействие на психическое и физическое здоровье, нарушая нашу способность адекватной эмоциональной регуляции и снижая качество жизни. Эти состояния характеризуются активацией автономных когнитивных процессов, направленных на постоянное планирование, анализ и самоконтроль, что приводит к отстранению от настоящего момента и утрате переживания его положительных аспектов.
    
    Научные исследования подтверждают, что хронический стресс является ключевым фактором, способствующим развитию синдрома эмоционального выгорания, который рассматривается как комплексное состояние физического, когнитивного и эмоционального истощения организма. Это истощение развивается под влиянием как внешних (например, неблагоприятные условия рабочей среды), так и внутренних (например, перфекционизм, особенности личности) факторов. Последствия выгорания не ограничиваются сферой психического здоровья; они включают повышение риска развития сердечно-сосудистых заболеваний и ускоренное биологическое старение организма.
    
    В качестве эффективного научно обоснованного вмешательства для преодоления данных состояний рекомендуется практика осознанности (mindfulness). Она направлена на десинхронизацию автоматических когнитивных циклов и восстановление внимания к настоящему моменту. Регулярная практика помогает вернуть контроль над вниманием, улучшить эмоциональную регуляцию и восстановить способность переживать положительные эмоции.

    Сегодня мы предлагаем вам практику "Ешьте изюм осознанно" 
  file:
  - 2.2.png
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_1 
  delay_minutes: 0
- id: practice_1 
  text: |
    Техника “Ешьте изюм осознанно”
    Вам понадобится несколько изюминок (или чего угодно!) для этой техники. Сядьте удобно там, где есть хорошее освещение и вас не будут беспокоить. Затем медленно настройте себя на прохождение практики
  file:
  - Ешьте изюм осознанно.2.pdf
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_1_end
  delay_minutes: 0
- id: day_1_end
  text: |
    Поздравляем вас с прохождением первой практики! Как вы оцениваете этот опыт? Что вы ощущали? Чем этот опыт отличается от обычного опыта употребления пищи? 
    Для закрепления навыка предлагаем вам проделывать это в течение нескольких ближайших дней. До встречи завтра!
  delay_minutes: 10
  - id: day_2
  text: |
    Осознанность — это научно обоснованный подход к улучшению психического здоровья, основанный на внимании к настоящему моменту без оценки. Исследования показывают, что практики осознанности способствуют снижению тревожности и депрессии, улучшению эмоциональной регуляции и повышению устойчивости к стрессу.
    
    Научно доказано, что осознанность работает как через сложные нейрокогнитивные механизмы (усиление саморегуляции, переработку эмоций), так и через прямое воздействие на биологические маркеры стресса и настроения. Регулярная практика способствует повышению общего благополучия и качества жизни за счет освоения новых, более конструктивных навыков реагирования. 
    
    Именно поэтому сегодня мы предлагаем вам расширить практику, о которой рассказывали вчера! 
  file:
  - 2.3.png
  buttons:
  - id: 1
    text: Начать практику
    action: start_course
    event: practice_2
  delay_minutes: 1140
- id: practice_2
  text: |
    Выберите одно повседневное действие, которое выполняете каждый день, и решите, что на этой неделе, насколько сможете, привнесете в каждый его элемент частичку намеренной и мягкой осознанности, как вы это делали с изюмом. Лучше это делать с одним и тем же действием каждый день в течение всей недели.
  file:
  - 2.4.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_2_end
  delay_minutes: 0
- id: day_2_end
  text: |
    Как вы себя чувствуете после практики? Осознайте свои ощущения, проанализируйте их, закрепите этот опыт повторением практики. До встречи завтра!
  delay_minutes: 10
- id: day_3
  text: | 
    Доброго вам дня! 
    Как вы себя чувствуете после наших первых практик? 
    
    Предлагаем вам сегодня повторить любую из пройденных практик. Продолжаем развивать навык осознанности – у вас обязательно получится! 
  delay_minutes: 1140
- id: day_4
  text: |  
    Доброго вам дня! 
    Работа на "автопилоте" часто сопровождается захватом сознания потоком мыслей — будь то планирование, воспоминания или мечты. Этот бесконечный цикл самокопания (руминации) является значимым фактором риска развития тревожных расстройств и депрессии.
    
    Ключевым механизмом, с помощью которого осознанность помогает выйти из этого состояния, является развитие децентрации (decentering). Это метакогнитивный процесс, при котором человек учится воспринимать свои мысли и эмоции не как абсолютную реальность, с которой необходимо идентифицироваться, а как временные психические события, проходящие через сознание.
    
    Вместо того чтобы сливаться с негативной мыслью (например, "Я неудачник"), практика осознанности учит замечать её: "Я замечаю, что у меня возникает мысль о неудаче". Это создает пространство между наблюдателем и мыслью, позволяя выйти из поглощающего потока руминации.
    
    Таким образом, осознанность не пытается подавить мысли силой воли, а меняет наше отношение к ним. Это позволяет прервать автоматические циклы, вернуться в настоящее и восстановить контакт с реальностью через прямое переживание — видение, слышание, ощущение.
    
    Сегодня мы предлагаем практику “Другой способ познания”
  file:
    - 2.5.png
  buttons:
    - id: 1
      text: Начать практику
      action: start_course
      event: practice_2
    delay_minutes: 1140
- id: practice_3
  text: |
    Функциональная МРТ и статистические исследования выявили, что практика осознанности приводит к:
    – Снижению связи между медиальной префронтальной корой (mPFC) и миндалевидным телом, что уменьшает эмоциональную реактивность на триггеры.
    – Усилению активности передней поясной коры (ACC), отвечающей за мониторинг конфликта и переключение внимания.
    
    Это нейропластическое изменение позволяет субъекту дистанцироваться от когнитивных содержаний. Вместо автоматической идентификации с мыслью («Я неудачник»), формируется мета-когнитивная позиция («Я наблюдаю мысль о том, что я неудачник»).
    Рандомизированные контролируемые испытания (РКИ) демонстрируют, что обучение навыку деконтекстуализации мыслей (decentering) снижает частоту рецидивов депрессии на 43–50% по сравнению с стандартной терапией, особенно у пациентов с тремя и более предыдущими эпизодами.
    
    Успешной практики!
  file:
  - 2.6.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_4_end
  delay_minutes: 0  
- id: day_4_end
  text: |  
    Поздравляем с прохождением третьей практики! 
    
    Что вы заметили, когда подключались  к ощущениям в своем теле? Что больше всего поразило вас в различии между двумя способами познания – думать о своем теле или поместить свое внимание внутрь телесных ощущений?

    До встречи завтра!
  delay_minutes: 0
- id: day_5
  text: |  
    Доброго дня! 
    Практика осознанности переключает мозг с режима «анализ и решение проблем» (где доминирует логика и внутренний диалог) на режим «непосредственного опыта». Нейробиологически это означает снижение активности зон, отвечающих за постоянный мысленный шум и руминацию, и активацию областей, обрабатывающих прямые сенсорные ощущения. В результате «громкий» критический ум уступает место более тихому, интуитивному состоянию мета-осведомленности, позволяющему наблюдать за мыслями и чувствами без автоматической реакции.
    Для закрепления этого навыка мы предлагаем вам упражнение «Встреча на улице». 
    Успешной практики!
  file:
    - 2.6.png
  buttons:
    - id: 1
      text: Начать практику
      action: start_course
      event: practice_4
  delay_minutes: 1140 
- id: practice_4
  text: |
   Данная техника - практическая тренировка переключения внимания в реальной среде: при столкновении с внешними событиями или людьми вы сознательно останавливаете автоматический внутренний диалог и переводите фокус на непосредственные ощущения (звуки, свет, тактильные чувства). Такая практика укрепляет способность мозга быстро выходить из режима «думания» в режим «бытия», снижая эмоциональную реактивность и повышая устойчивость к стрессу.
  file:
  - 2.7.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_5_end
  delay_minutes: 0  
- id: day_5_end
  text: |  
    Поздравляем с прохождением четвертой практики! 
    
    Научная психология утверждает, что мысли не являются отражением объективной реальности, а представляют собой временные ментальные события, возникающие в сознании. Эмоциональные реакции человека определяются не самим событием, а интерпретацией, которую он этому событию придает. Например, одна и та же ситуация (друг не ответил на приветствие) может вызвать у человека в плохом настроении мысли "Я никому не нужен", ведущие к грусти, а у человека в хорошем настроении — нейтральную мысль "Возможно, он меня не увидел", не вызывающую негативных эмоций. 
    Этот процесс создает замкнутый круг: наше настроение влияет на интерпретацию событий, а последующие эмоции укрепляют исходное настроение.
    
    Практики осознанности помогает разорвать этот порочный круг. Они обучают децентрации — способности наблюдать за своими мыслями и чувствами как за проходящими событиями, а не идентифицировать себя с ними, тем самым помогая разорвать порочный круг. 

    До встречи завтра!
  delay_minutes: 0  
- id: day_6
  text: | 
    Доброго вам дня! 
    Как вы себя чувствуете после предложенных нами практик? 
    
    Предлагаем вам сегодня повторить любую из пройденных практик. Продолжаем развивать навык осознанности – у вас обязательно получится! 
  delay_minutes: 1140
- id: day_7
  text: |  
    Доброго дня!
    
    Научные исследования подтверждают, что блуждание ума в прошлое и будущее — это не метафора, а обозначение конкретного когнитивного процесса, известного как "ментальное путешествие во времени" (mental time travel). Этот процесс лежит в основе эпизодической памяти и планирования будущего.
    Он активируется как при воспоминании прошлых событий, так и при построении симуляций будущего . Именно такая фоновая работа и приводит к тому, что мы "теряемся" в сожалениях или тревогах, уходя из настоящего момента.
    
    Практики осознанности действуют как противоположный механизм. Они направляет внимание на прямые сенсорные ощущения (дыхание, звуки, прикосновения), активируя сенсорные и проприоцептивные области мозга. Это позволяет вернуться к переживанию реальности "здесь и сейчас", где и происходит жизнь.
    
    Сегодня мы предлагаем вам трехминутную медитативную передышку. 
  file:
    - 2.7.png
  buttons:
    - id: 1
      text: Начать практику
      action: start_course
      event: practice_5
  delay_minutes: 1140 
- id: practice_5
  text: |
   «Трехминутная медитативная передышка» представляет собой краткосрочную интервенцию на основе осознанности, разработанную для оперативного переключения когнитивного режима с автоматического «режима выполнения» на адаптивный «режим бытия». С точки зрения нейробиологии, эта практика действует как «когнитивный переключатель», прерывая автоматические петли руминации и эмоциональной реактивности, которые поддерживаются гиперактивностью сети пассивного режима работы мозга и миндалевидного тела.
  file:
  - 2.7.png
  buttons:
  - id: 1
    text: Завершить практику
    action: start_course
    event: day_7_end
  delay_minutes: 0  
- id: day_7_end
  text: |  
    Поздравляем с прохождением пятой практики! 
    Что вы сделали после того, как заметили, что ваши мысли блуждают? 
    
    Не ругайте себя за это. В случае обнаружения отклонения внимания от объекта медитации (феномен блуждания ума), критически важно исключить самокритику и негативную эмоциональную оценку данного события, так как подобные реакции активируют дополнительные стрессовые контуры и усиливают когнитивную нагрузку. Вместо этого следует применить стратегию мягкого, безоценочного возвращения фокуса внимания к исходному объекту концентрации. Именно это и представляет собой фундаментальный элемент тренировки мета-когнитивного контроля и нейропластичности.
    До встречи завтра!
  delay_minutes: 0  
